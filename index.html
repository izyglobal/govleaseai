
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovLeaseAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a202c;font-size:14px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f0f0f0;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
button{font-family:inherit;cursor:pointer;outline:none;}
select,input{font-family:inherit;outline:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;

// ===== DATA =====
const INSTALLATIONS=[
  {id:"hood",name:"Fort Cavazos",branch:"Army",state:"TX",lat:31.13,lng:-97.78},
  {id:"bliss",name:"Fort Bliss",branch:"Army",state:"TX",lat:31.81,lng:-106.42},
  {id:"sill",name:"Fort Sill",branch:"Army",state:"OK",lat:34.65,lng:-98.40},
  {id:"polk",name:"Fort Johnson",branch:"Army",state:"LA",lat:31.05,lng:-93.20},
  {id:"lejeune",name:"Camp Lejeune",branch:"Marines",state:"NC",lat:34.62,lng:-77.35},
  {id:"pendleton",name:"Camp Pendleton",branch:"Marines",state:"CA",lat:33.30,lng:-117.35},
  {id:"norfolk",name:"NB Norfolk",branch:"Navy",state:"VA",lat:36.95,lng:-76.33},
  {id:"ellsworth",name:"Ellsworth AFB",branch:"Air Force",state:"SD",lat:44.15,lng:-103.10},
];
const EQUIP_TYPES=[
  {type:"CAT D6 Bulldozer",nsn:"3805-01-456-7890",cost:285000,img:"https://images.unsplash.com/photo-1621922688758-8d99f5697d02?w=300&h=200&fit=crop"},
  {type:"CAT 320 Excavator",nsn:"3805-01-567-8901",cost:342000,img:"https://images.unsplash.com/photo-1580901368919-7738efb0f228?w=300&h=200&fit=crop"},
  {type:"CAT 140M Grader",nsn:"3805-01-234-5678",cost:410000,img:"https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=300&h=200&fit=crop"},
  {type:"CAT 950 Wheel Loader",nsn:"3805-01-678-9012",cost:265000,img:"https://images.unsplash.com/photo-1629118573298-eed895217e69?w=300&h=200&fit=crop"},
  {type:"CASE 580 Backhoe",nsn:"3805-01-345-6789",cost:112000,img:"https://images.unsplash.com/photo-1621922688758-8d99f5697d02?w=300&h=200&fit=crop"},
  {type:"Bobcat T770 Skid Steer",nsn:"3805-01-789-0123",cost:78000,img:"https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=300&h=200&fit=crop"},
];
const STATUSES=["Active","Idle","Maintenance","In-Transit","Reserved"];

function seededRng(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function genEquip(){
  const r=seededRng(42),items=[];let id=1000;
  INSTALLATIONS.forEach(inst=>{
    const n=6+Math.floor(r()*10);
    for(let i=0;i<n;i++){
      const eq=EQUIP_TYPES[Math.floor(r()*EQUIP_TYPES.length)];
      const sw=[0.28,0.38,0.1,0.04,0.2];let rv=r(),c=0,si=0;
      for(let s=0;s<sw.length;s++){c+=sw[s];if(rv<c){si=s;break;}}
      const ut=si===1?Math.floor(r()*22):si===0?40+Math.floor(r()*55):Math.floor(r()*55);
      const di=si===1?15+Math.floor(r()*110):0;
      items.push({
        id:`C-${String(++id).padStart(5,'0')}`,type:eq.type,nsn:eq.nsn,cost:eq.cost,img:eq.img,
        instId:inst.id,instName:inst.name,branch:inst.branch,state:inst.state,
        status:STATUSES[si],utilization:ut,daysIdle:di,
        condition:r()>0.18?"Good":"Fair",
        availDate:si===1?`${['03','04','05'][Math.floor(r()*3)]}/${String(1+Math.floor(r()*28)).padStart(2,'0')}/2026`:"N/A",
      });
    }
  });
  return items;
}
function genDemands(){return[
  {id:"DEM-001",instId:"bliss",type:"CAT D6 Bulldozer",urgency:"High",date:"03/01/2026",status:"Open"},
  {id:"DEM-002",instId:"sill",type:"CAT 320 Excavator",urgency:"Medium",date:"02/20/2026",status:"Open"},
  {id:"DEM-003",instId:"lejeune",type:"CAT 950 Wheel Loader",urgency:"High",date:"03/10/2026",status:"Open"},
  {id:"DEM-004",instId:"pendleton",type:"CASE 580 Backhoe",urgency:"Low",date:"03/05/2026",status:"Open"},
  {id:"DEM-005",instId:"norfolk",type:"CAT 140M Grader",urgency:"Medium",date:"02/28/2026",status:"Open"},
  {id:"DEM-006",instId:"hood",type:"CAT 320 Excavator",urgency:"High",date:"03/12/2026",status:"Open"},
  {id:"DEM-007",instId:"polk",type:"Bobcat T770 Skid Steer",urgency:"High",date:"03/15/2026",status:"Open"},
];}
function dist(a,b){
  const m=Object.fromEntries(INSTALLATIONS.map(i=>[i.id,i]));
  const[la,lb]=[m[a],m[b]];if(!la||!lb)return 9999;
  const R=3959,dLa=(lb.lat-la.lat)*Math.PI/180,dLo=(lb.lng-la.lng)*Math.PI/180;
  const x=Math.sin(dLa/2)**2+Math.cos(la.lat*Math.PI/180)*Math.cos(lb.lat*Math.PI/180)*Math.sin(dLo/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
function runEngine(eq,dem){
  const m=[];
  dem.forEach(d=>{
    eq.filter(e=>e.type===d.type&&e.status==="Idle"&&e.condition==="Good"&&e.instId!==d.instId)
    .forEach(e=>{
      const di=dist(e.instId,d.instId),tc=Math.round(di*4.2+1200),ca=e.cost-tc;
      const co=Math.min(97,Math.max(58,100-(di/50)-(e.daysIdle>90?5:0)+(d.urgency==="High"?8:0)));
      m.push({
        id:`M-${String(m.length+1).padStart(3,'0')}`,demId:d.id,eqId:e.id,type:e.type,img:e.img,
        srcName:e.instName,srcBranch:e.branch,srcState:e.state,
        dstName:INSTALLATIONS.find(i=>i.id===d.instId)?.name,
        dstBranch:INSTALLATIONS.find(i=>i.id===d.instId)?.branch,
        distance:di,transportCost:tc,replaceCost:e.cost,avoidance:ca,
        confidence:Math.round(co),urgency:d.urgency,daysIdle:e.daysIdle,
        miprStatus:"Pending",
      });
    });
  });
  return m.sort((a,b)=>b.confidence-a.confidence).slice(0,20);
}

const MIPR_STEPS=["Return Initiated","Schedule Pickup","Equipment Collection","Condition Verification","Return Complete"];

// ===== STYLES =====
const navy="#1a2332",accent="#2563eb",green="#16a34a",amber="#d97706",red="#dc2626",
  bg="#f5f7fa",white="#ffffff",border="#e5e7eb",textDark="#1a202c",textMed="#4a5568",textLight="#9ca3af";

// ===== COMPONENTS =====
function Badge({text,color}){
  const colors={High:red,Medium:amber,Low:textLight,Active:green,Idle:amber,
    Maintenance:red,"In-Transit":accent,Reserved:textLight,Open:accent,
    Pending:amber,Approved:green,Denied:red,Good:green,Fair:amber,
    Army:green,Marines:red,Navy:accent,"Air Force":"#6366f1"};
  const c=colors[text]||color||textLight;
  return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,
    background:c+"15",color:c,border:`1px solid ${c}30`}}>{text}</span>;
}

function StatBox({label,value,sub}){
  return <div style={{background:white,borderRadius:10,padding:"18px 20px",flex:1,minWidth:150,
    border:`1px solid ${border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
    <div style={{fontSize:28,fontWeight:700,color:textDark}}>{value}</div>
    <div style={{fontSize:12,color:textMed,marginTop:2}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:textLight,marginTop:2}}>{sub}</div>}
  </div>;
}

function Card({children,style={}}){
  return <div style={{background:white,borderRadius:10,border:`1px solid ${border}`,
    boxShadow:"0 1px 3px rgba(0,0,0,0.04)",overflow:"hidden",...style}}>{children}</div>;
}

function CardHeader({children}){
  return <div style={{padding:"14px 20px",borderBottom:`1px solid ${border}`,fontWeight:600,fontSize:14,
    display:"flex",justifyContent:"space-between",alignItems:"center"}}>{children}</div>;
}

// ===== APP =====
function App(){
  const [page,setPage]=useState("dashboard");
  const [equipment]=useState(genEquip);
  const [demands]=useState(genDemands);
  const matches=useMemo(()=>runEngine(equipment,demands),[equipment,demands]);
  const [search,setSearch]=useState("");
  const [selMatch,setSelMatch]=useState(null);
  const [miprStep,setMiprStep]=useState(0);
  const [fBranch,setFBranch]=useState("All");
  const [fStatus,setFStatus]=useState("All");
  const [reqTab,setReqTab]=useState("Pending");

  const idle=equipment.filter(e=>e.status==="Idle").length;
  const totalCA=matches.reduce((s,m)=>s+m.avoidance,0);
  const crossSvc=matches.filter(m=>m.srcBranch!==m.dstBranch).length;

  const filtered=equipment.filter(e=>{
    const b=fBranch==="All"||e.branch===fBranch;
    const s=fStatus==="All"||e.status===fStatus;
    const q=!search||e.type.toLowerCase().includes(search.toLowerCase())||e.id.toLowerCase().includes(search.toLowerCase());
    return b&&s&&q;
  });

  const navItems=[
    {id:"dashboard",label:"Dashboard"},
    {id:"equipment",label:"Equipment"},
    {id:"matches",label:"AI Matches"},
    {id:"requests",label:"Transfer Requests"},
    {id:"transportation",label:"Transportation"},
    {id:"reports",label:"Reports"},
  ];

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {/* NAV BAR */}
    <div style={{background:navy,padding:"0 24px",display:"flex",alignItems:"center",height:52}}>
      <div style={{fontSize:18,fontWeight:700,color:white,marginRight:40,letterSpacing:0.5}}>GovLeaseAI</div>
      <div style={{display:"flex",gap:0,flex:1}}>
        {navItems.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{
          padding:"14px 16px",border:"none",fontSize:13,fontWeight:page===n.id?600:400,
          color:page===n.id?white:"#94a3b8",background:page===n.id?"rgba(255,255,255,0.1)":"transparent",
          borderBottom:page===n.id?"2px solid "+accent:"2px solid transparent",
        }}>{n.label}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:12,color:"#94a3b8"}}>Ismaila Raji</span>
        <div style={{width:32,height:32,borderRadius:"50%",background:accent,display:"flex",
          alignItems:"center",justifyContent:"center",color:white,fontSize:13,fontWeight:700}}>IR</div>
      </div>
    </div>

    {/* CONTENT */}
    <div style={{flex:1,padding:"20px 24px",maxWidth:1280,margin:"0 auto",width:"100%"}} className="fade-in" key={page}>

      {/* ===== DASHBOARD ===== */}
      {page==="dashboard"&&<div>
        <h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Welcome, Ismaila!</h1>
        <p style={{color:textMed,marginBottom:20,fontSize:13}}>Cross-service equipment visibility and transfer management</p>

        <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
          <StatBox value={equipment.length} label="Total Equipment" sub="Class IV across 8 installations"/>
          <StatBox value={matches.length} label="AI Match Signals" sub={`${crossSvc} cross-service opportunities`}/>
          <StatBox value={idle} label="Idle Equipment" sub="Available for lateral transfer"/>
          <StatBox value={demands.length} label="Open Requests" sub="Awaiting fulfillment"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          {/* Transfer Requests */}
          <Card>
            <CardHeader><span>TRANSFER REQUESTS</span><button onClick={()=>setPage("requests")} style={{border:"none",background:"none",color:accent,fontSize:12,fontWeight:500}}>View all requests</button></CardHeader>
            <div style={{padding:0}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`1px solid ${border}`}}>
                  {["Installation","Equipment","Requested","Status"].map(h=><th key={h} style={{padding:"10px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {demands.slice(0,4).map(d=><tr key={d.id} style={{borderBottom:`1px solid ${border}`}}>
                    <td style={{padding:"10px 16px"}}>{INSTALLATIONS.find(i=>i.id===d.instId)?.name}</td>
                    <td style={{padding:"10px 16px"}}>{d.type.split(' ').slice(-1)[0]}</td>
                    <td style={{padding:"10px 16px",color:textLight}}>{d.date}</td>
                    <td style={{padding:"10px 16px"}}><Badge text={d.status==="Open"?"Pending":"Approved"}/></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Top AI Matches */}
          <Card>
            <CardHeader><span>TOP AI MATCHES</span><button onClick={()=>setPage("matches")} style={{border:"none",background:"none",color:accent,fontSize:12,fontWeight:500}}>View all matches</button></CardHeader>
            <div style={{padding:0}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`1px solid ${border}`}}>
                  {["Equipment","Route","Savings","Conf"].map(h=><th key={h} style={{padding:"10px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {matches.slice(0,4).map(m=><tr key={m.id} style={{borderBottom:`1px solid ${border}`,cursor:"pointer"}}
                    onClick={()=>{setSelMatch(m);setMiprStep(0);setPage("requests");}}>
                    <td style={{padding:"10px 16px",fontWeight:500}}>{m.type.split(' ').slice(-1)[0]}</td>
                    <td style={{padding:"10px 16px",fontSize:11}}>{m.srcName} → {m.dstName}</td>
                    <td style={{padding:"10px 16px",fontWeight:600,color:green}}>${(m.avoidance/1000).toFixed(0)}K</td>
                    <td style={{padding:"10px 16px"}}><span style={{fontWeight:600,color:m.confidence>85?green:amber}}>{m.confidence}%</span></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </Card>
        </div>

        {/* Cost Avoidance Summary */}
        <Card>
          <CardHeader><span>COST AVOIDANCE SUMMARY</span></CardHeader>
          <div style={{padding:20,display:"flex",gap:40,alignItems:"center",flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:36,fontWeight:700,color:green}}>${(totalCA/1e6).toFixed(2)}M</div>
              <div style={{fontSize:12,color:textMed}}>Total potential cost avoidance</div>
            </div>
            <div style={{flex:1,minWidth:300}}>
              {INSTALLATIONS.filter(inst=>matches.some(m=>m.srcName===inst.name)).slice(0,5).map(inst=>{
                const ia=matches.filter(m=>m.srcName===inst.name).reduce((s,m)=>s+m.avoidance,0);
                const mx=Math.max(...INSTALLATIONS.map(i=>matches.filter(m=>m.srcName===i.name).reduce((s,m)=>s+m.avoidance,0)),1);
                return <div key={inst.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span>{inst.name}</span>
                    <span style={{fontWeight:600,color:green}}>${(ia/1000).toFixed(0)}K</span>
                  </div>
                  <div style={{height:6,background:"#e5e7eb",borderRadius:3}}>
                    <div style={{height:"100%",borderRadius:3,width:`${(ia/mx)*100}%`,background:`linear-gradient(90deg,${accent},${green})`}}/>
                  </div>
                </div>;
              })}
            </div>
          </div>
        </Card>
      </div>}

      {/* ===== EQUIPMENT ===== */}
      {page==="equipment"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Equipment Inventory</h1>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:250,position:"relative"}}>
            <span style={{position:"absolute",left:12,top:10,color:textLight,fontSize:14}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search for equipment..."
              style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:8,border:`1px solid ${border}`,fontSize:13,background:white}}/>
          </div>
          <select value={fBranch} onChange={e=>setFBranch(e.target.value)}
            style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${border}`,fontSize:13,background:white}}>
            <option value="All">All Branches</option>
            {["Army","Marines","Navy","Air Force"].map(b=><option key={b}>{b}</option>)}
          </select>
          <select value={fStatus} onChange={e=>setFStatus(e.target.value)}
            style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${border}`,fontSize:13,background:white}}>
            <option value="All">All Statuses</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>

        {/* Equipment Cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {filtered.slice(0,24).map(e=><Card key={e.id} style={{cursor:"pointer"}}>
            <div style={{height:140,background:`url(${e.img}) center/cover`,position:"relative"}}>
              <div style={{position:"absolute",top:8,right:8}}><Badge text={e.status}/></div>
            </div>
            <div style={{padding:14}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{e.type}</div>
              <div style={{fontSize:12,color:textMed,marginBottom:6}}>{e.instName}, {e.state} · {e.branch}</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:textLight}}>
                <span>ID: {e.id}</span>
                <span>Condition: <span style={{color:e.condition==="Good"?green:amber,fontWeight:500}}>{e.condition}</span></span>
              </div>
              {e.status==="Idle"&&<div style={{marginTop:8,padding:"6px 0",borderTop:`1px solid ${border}`,fontSize:11,color:amber,fontWeight:500}}>
                Idle {e.daysIdle} days · Available {e.availDate}
              </div>}
            </div>
          </Card>)}
        </div>
        <div style={{textAlign:"center",padding:16,fontSize:12,color:textLight}}>
          Showing {Math.min(filtered.length,24)} of {filtered.length} equipment records
        </div>
      </div>}

      {/* ===== AI MATCHES ===== */}
      {page==="matches"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>AI Match Recommendations</h1>
        <p style={{color:textMed,fontSize:13,marginBottom:16}}>Algorithm analyzed {idle} idle assets against {demands.length} open requests. Top {matches.length} matches shown.</p>

        {matches.map(m=><Card key={m.id} style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"stretch"}}>
            <div style={{width:160,background:`url(${m.img}) center/cover`,minHeight:120}}/>
            <div style={{flex:1,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:600,fontSize:15}}>{m.type}</div>
                  <div style={{fontSize:12,color:textMed,marginTop:2}}>
                    {m.srcName} ({m.srcBranch}) → {m.dstName} ({m.dstBranch})
                    {m.srcBranch!==m.dstBranch&&<Badge text="Cross-Service"/>}
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:700,color:green}}>${(m.avoidance/1000).toFixed(0)}K</div>
                  <div style={{fontSize:10,color:textLight}}>cost avoidance</div>
                </div>
              </div>
              <div style={{display:"flex",gap:20,fontSize:12,color:textMed,marginBottom:10}}>
                <span>Distance: <b>{m.distance} mi</b></span>
                <span>Transport: <b style={{color:red}}>${m.transportCost.toLocaleString()}</b></span>
                <span>Replacement: <b>${m.replaceCost.toLocaleString()}</b></span>
                <span>Idle: <b>{m.daysIdle}d</b></span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:80,height:6,background:"#e5e7eb",borderRadius:3}}>
                    <div style={{width:`${m.confidence}%`,height:"100%",borderRadius:3,background:m.confidence>85?green:amber}}/>
                  </div>
                  <span style={{fontSize:12,fontWeight:600,color:m.confidence>85?green:amber}}>{m.confidence}%</span>
                </div>
                <Badge text={m.urgency}/>
                <button onClick={()=>{setSelMatch(m);setMiprStep(0);setPage("requests");}}
                  style={{marginLeft:"auto",padding:"8px 20px",borderRadius:8,border:"none",
                    background:accent,color:white,fontSize:12,fontWeight:600}}>
                  Initiate Transfer →
                </button>
              </div>
            </div>
          </div>
        </Card>)}
      </div>}

      {/* ===== TRANSFER REQUESTS (MIPR) ===== */}
      {page==="requests"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Transfer Requests</h1>

        {selMatch?<div>
          {/* MIPR Workflow */}
          <Card style={{marginBottom:16}}>
            <CardHeader><span>Transfer Workflow — DD Form 448 (MIPR)</span></CardHeader>
            <div style={{padding:20}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:24}}>
                {MIPR_STEPS.map((s,i)=><React.Fragment key={i}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:0}}>
                    <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:14,fontWeight:700,
                      background:i<miprStep?green:i===miprStep?accent:"#e5e7eb",
                      color:i<=miprStep?white:textLight,
                      border:i===miprStep?`3px solid ${accent}40`:"none",
                    }}>{i<miprStep?"✓":i+1}</div>
                    <div style={{fontSize:9,color:i<=miprStep?textDark:textLight,marginTop:4,textAlign:"center",width:80,fontWeight:i===miprStep?600:400}}>{s}</div>
                  </div>
                  {i<MIPR_STEPS.length-1&&<div style={{flex:1,height:2,background:i<miprStep?green:"#e5e7eb",margin:"0 4px",marginBottom:20}}/>}
                </React.Fragment>)}
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={()=>setMiprStep(Math.max(0,miprStep-1))} style={{padding:"8px 20px",borderRadius:8,border:`1px solid ${border}`,background:white,fontSize:12,fontWeight:500}}>← Back</button>
                <button onClick={()=>setMiprStep(Math.min(4,miprStep+1))} style={{padding:"8px 24px",borderRadius:8,border:"none",background:accent,color:white,fontSize:12,fontWeight:600}}>
                  {miprStep<4?"Next Step →":"Complete Transfer ✓"}
                </button>
              </div>
            </div>
          </Card>

          {/* Transfer Details */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <Card>
              <CardHeader><span>Equipment Details</span></CardHeader>
              <div style={{padding:16}}>
                <div style={{height:150,background:`url(${selMatch.img}) center/cover`,borderRadius:8,marginBottom:12}}/>
                {[["Equipment ID",selMatch.eqId],["Type",selMatch.type],["Source",`${selMatch.srcName} (${selMatch.srcBranch})`],
                  ["Destination",`${selMatch.dstName} (${selMatch.dstBranch})`],["Distance",`${selMatch.distance} miles`],
                  ["Idle Days",`${selMatch.daysIdle} days`]].map(([k,v])=>
                  <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${border}`,fontSize:12}}>
                    <span style={{color:textLight}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
                  </div>)}
              </div>
            </Card>
            <Card>
              <CardHeader><span>Financial Summary</span></CardHeader>
              <div style={{padding:16}}>
                {[["Replacement Cost",`$${selMatch.replaceCost.toLocaleString()}`,textDark],
                  ["Transport Cost",`$${selMatch.transportCost.toLocaleString()}`,red],
                  ["Cost Avoidance",`$${selMatch.avoidance.toLocaleString()}`,green],
                  ["Match Confidence",`${selMatch.confidence}%`,selMatch.confidence>85?green:amber],
                  ["Appropriation","O&M — VALIDATED ✓",green],
                  ["Anti-Deficiency Act","CLEARED — No violations",green],
                  ["MIPR Status",miprStep>=4?"COMPLETE":"AWAITING OFFICER SIGNATURE",miprStep>=4?green:amber],
                ].map(([k,v,c])=>
                  <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${border}`,fontSize:12}}>
                    <span style={{color:textLight}}>{k}</span><span style={{fontWeight:600,color:c}}>{v}</span>
                  </div>)}
              </div>
            </Card>
          </div>
        </div>:
        /* Request List */
        <div>
          <div style={{display:"flex",gap:0,marginBottom:16}}>
            {["Pending","Approved","Denied"].map(t=><button key={t} onClick={()=>setReqTab(t)} style={{
              padding:"8px 20px",border:`1px solid ${border}`,fontSize:12,fontWeight:reqTab===t?600:400,
              background:reqTab===t?accent:white,color:reqTab===t?white:textMed,
              borderRadius:t==="Pending"?"8px 0 0 8px":t==="Denied"?"0 8px 8px 0":"0",
            }}>{t}</button>)}
          </div>
          <Card>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${border}`}}>
                {["Equipment","Installation","Branch","Requested","Urgency","Status","Action"].map(h=>
                  <th key={h} style={{padding:"12px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {demands.map(d=>{
                  const inst=INSTALLATIONS.find(i=>i.id===d.instId);
                  const bestMatch=matches.find(m=>m.demId===d.id);
                  return <tr key={d.id} style={{borderBottom:`1px solid ${border}`}}>
                    <td style={{padding:"12px 16px",fontWeight:500}}>{d.type}</td>
                    <td style={{padding:"12px 16px"}}>{inst?.name}</td>
                    <td style={{padding:"12px 16px"}}><Badge text={inst?.branch}/></td>
                    <td style={{padding:"12px 16px",color:textLight}}>{d.date}</td>
                    <td style={{padding:"12px 16px"}}><Badge text={d.urgency}/></td>
                    <td style={{padding:"12px 16px"}}><Badge text="Pending"/></td>
                    <td style={{padding:"12px 16px"}}>
                      {bestMatch&&<button onClick={()=>{setSelMatch(bestMatch);setMiprStep(0);}}
                        style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${accent}`,background:white,color:accent,fontSize:11,fontWeight:500}}>
                        View Match →
                      </button>}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </Card>
        </div>}
      </div>}

      {/* ===== TRANSPORTATION ===== */}
      {page==="transportation"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Transportation Dashboard</h1>
        <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
          <StatBox value="24" label="In Transit"/>
          <StatBox value="12" label="Delivered Today"/>
          <StatBox value="18" label="Scheduled Pickups"/>
          <StatBox value="2.3d" label="Avg. Delivery Time"/>
        </div>
        <Card>
          <CardHeader><span>ACTIVE SHIPMENTS</span></CardHeader>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{borderBottom:`2px solid ${border}`}}>
              {["Shipment ID","Equipment","From","To","Status","Progress","ETA"].map(h=>
                <th key={h} style={{padding:"12px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {[
                {id:"SH-2026-1847",eq:"CAT D6 Bulldozer",from:"Fort Cavazos",to:"Fort Bliss",status:"In Transit",pct:65,eta:"2h 15m"},
                {id:"SH-2026-1848",eq:"CAT 320 Excavator",from:"Fort Sill",to:"Camp Lejeune",status:"In Transit",pct:30,eta:"18h"},
                {id:"SH-2026-1849",eq:"CASE 580 Backhoe",from:"Camp Pendleton",to:"NB Norfolk",status:"Scheduled",pct:0,eta:"Mar 20"},
                {id:"SH-2026-1850",eq:"Bobcat T770 Skid Steer",from:"Fort Johnson",to:"Fort Bliss",status:"Delivered",pct:100,eta:"Complete"},
              ].map(s=><tr key={s.id} style={{borderBottom:`1px solid ${border}`}}>
                <td style={{padding:"12px 16px",fontFamily:"monospace",fontSize:11}}>{s.id}</td>
                <td style={{padding:"12px 16px",fontWeight:500}}>{s.eq}</td>
                <td style={{padding:"12px 16px"}}>{s.from}</td>
                <td style={{padding:"12px 16px"}}>{s.to}</td>
                <td style={{padding:"12px 16px"}}><Badge text={s.status}/></td>
                <td style={{padding:"12px 16px"}}>
                  <div style={{width:80,height:5,background:"#e5e7eb",borderRadius:3}}>
                    <div style={{width:`${s.pct}%`,height:"100%",borderRadius:3,background:s.pct===100?green:accent}}/>
                  </div>
                </td>
                <td style={{padding:"12px 16px",fontSize:11,color:textLight}}>{s.eta}</td>
              </tr>)}
            </tbody>
          </table>
        </Card>
      </div>}

      {/* ===== REPORTS ===== */}
      {page==="reports"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Reports & Analytics</h1>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <Card>
            <CardHeader><span>UTILIZATION OVERVIEW</span></CardHeader>
            <div style={{padding:20}}>
              <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:16}}>
                <div style={{position:"relative",width:100,height:100}}>
                  <svg viewBox="0 0 36 36" style={{width:100,height:100,transform:"rotate(-90deg)"}}>
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e5e7eb" strokeWidth="3"/>
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke={accent} strokeWidth="3"
                      strokeDasharray={`${Math.round((equipment.length-idle)/equipment.length*100)} 100`}/>
                  </svg>
                  <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700}}>{Math.round((equipment.length-idle)/equipment.length*100)}%</div>
                    <div style={{fontSize:8,color:textLight}}>In Use</div>
                  </div>
                </div>
                <div>
                  {[["Active",equipment.filter(e=>e.status==="Active").length,green],
                    ["Idle",idle,amber],
                    ["Maintenance",equipment.filter(e=>e.status==="Maintenance").length,red],
                    ["Reserved",equipment.filter(e=>e.status==="Reserved").length,textLight],
                  ].map(([k,v,c])=><div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,fontSize:12}}>
                    <div style={{width:8,height:8,borderRadius:2,background:c}}/>{k}: <b>{v}</b>
                  </div>)}
                </div>
              </div>
            </div>
          </Card>
          <Card>
            <CardHeader><span>ASSET DISTRIBUTION</span></CardHeader>
            <div style={{padding:20}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`1px solid ${border}`}}>
                  {["Type","Quantity","Avg Utilization"].map(h=><th key={h} style={{padding:"6px 0",textAlign:"left",color:textLight,fontSize:11}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {EQUIP_TYPES.map(t=>{
                    const ct=equipment.filter(e=>e.type===t.type);
                    const avg=ct.length?Math.round(ct.reduce((s,e)=>s+e.utilization,0)/ct.length):0;
                    return <tr key={t.type} style={{borderBottom:`1px solid ${border}`}}>
                      <td style={{padding:"8px 0",fontWeight:500}}>{t.type.split(' ').slice(-2).join(' ')}</td>
                      <td style={{padding:"8px 0"}}>{ct.length}</td>
                      <td style={{padding:"8px 0"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:60,height:5,background:"#e5e7eb",borderRadius:3}}>
                            <div style={{width:`${avg}%`,height:"100%",borderRadius:3,background:avg>50?green:amber}}/>
                          </div>
                          <span style={{fontSize:11}}>{avg}%</span>
                        </div>
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
        <Card>
          <CardHeader><span>PILOT EXECUTIVE SUMMARY</span></CardHeader>
          <div style={{padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,fontSize:12}}>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Configuration</div>
              <div>Equipment: <b>Class IV Construction</b></div>
              <div>Installations: <b>8 monitored</b></div>
              <div>Branches: <b>Army, Marines, Navy, AF</b></div>
              <div>Data: <b>DPAS Batch (Daily)</b></div>
            </div>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Performance</div>
              <div>Records: <b>{equipment.length}</b></div>
              <div>Idle Detected: <b style={{color:amber}}>{idle}</b></div>
              <div>Matches: <b style={{color:green}}>{matches.length}</b></div>
              <div>Cross-Service: <b>{crossSvc}</b></div>
            </div>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Financial Impact</div>
              <div>Cost Avoidance: <b style={{color:green}}>${(totalCA/1e6).toFixed(2)}M</b></div>
              <div>Phase 1 Cost: <b>$575,000</b></div>
              <div>ROI: <b style={{color:green}}>{Math.round(totalCA/575000)}x</b></div>
            </div>
          </div>
        </Card>
      </div>}

    </div>

    {/* FOOTER */}
    <div style={{padding:"10px 24px",borderTop:`1px solid ${border}`,background:white,
      display:"flex",justifyContent:"space-between",fontSize:10,color:textLight}}>
      <span>GovLeaseAI v1.0 · Patent Pending USPTO 63/823,715 · Izy Global Services LLC (SDVOSB) · CAGE: 949Y3</span>
      <span style={{color:amber,fontWeight:500}}>DEMO — SYNTHETIC DATA — NOT CONNECTED TO GOVERNMENT SYSTEMS</span>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
