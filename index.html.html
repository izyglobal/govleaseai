<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovLeaseAI — Live Federal Equipment Data</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a202c;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
button{font-family:inherit;cursor:pointer;outline:none}
select,input{font-family:inherit;outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease forwards}
.spinner{width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback}=React;

// ===== CONSTANTS =====
const navy="#1a2332",accent="#2563eb",green="#16a34a",amber="#d97706",red="#dc2626",
  borderC="#e5e7eb",textDark="#1a202c",textMed="#4a5568",textLight="#9ca3af",white="#ffffff";

// Construction/heavy equipment keywords for filtering GSA data
const EQUIP_KEYWORDS=["bulldozer","excavator","grader","loader","backhoe","dozer","tractor","forklift",
  "crane","dump truck","skid steer","compactor","roller","scraper","trencher","paver",
  "generator","trailer","truck","vehicle","van","suv","sedan","pickup",
  "mower","chipper","saw","drill","welder","compressor"];

const CONSTRUCTION_KEYWORDS=["bulldozer","excavator","grader","loader","backhoe","dozer","skid steer",
  "compactor","roller","scraper","trencher","paver","crane","forklift"];

// ===== GSA API FETCH =====
async function fetchGSAData(){
  try{
    const url="https://api.gsa.gov/assets/gsaauctions/v2/auctions?api_key=DEMO_KEY&format=JSON";
    const res=await fetch(url);
    if(!res.ok) throw new Error(`API returned ${res.status}`);
    const data=await res.json();
    return Array.isArray(data)?data:[];
  }catch(e){
    console.warn("GSA API fetch failed:",e.message);
    return null;
  }
}

function processGSAItems(raw){
  if(!raw||!raw.length) return [];
  return raw.map((item,i)=>{
    const name=(item.ItemName||"").trim();
    const lot=(item.LotDescript||"").trim();
    const desc=name||lot;
    const lower=desc.toLowerCase();
    const isConstruction=CONSTRUCTION_KEYWORDS.some(k=>lower.includes(k));
    const isEquipment=EQUIP_KEYWORDS.some(k=>lower.includes(k));
    if(!isEquipment&&!isConstruction) return null;

    const agency=(item.AgencyName||"Federal Agency").trim();
    const bureau=(item.BureauName||"").trim();
    const city=(item.PropertyCity||"").trim();
    const state=(item.PropertyState||"").trim();
    const status=item.AuctionStatus==="A"?"Active Auction":item.AuctionStatus==="P"?"Preview":"Scheduled";
    const highBid=parseFloat(item.HighBidAmount)||0;
    const bidders=parseInt(item.BiddersCount)||0;
    const saleNo=(item.SaleNo||"").trim();
    const imgUrl=(item.ImageURL||"").trim();
    const startDate=(item.AucStartDt||"").trim();
    const endDate=(item.AucEndDt||"").trim();

    // Estimate replacement cost based on equipment type
    let estCost=50000;
    if(lower.includes("bulldozer")||lower.includes("dozer")) estCost=285000;
    else if(lower.includes("excavator")) estCost=342000;
    else if(lower.includes("grader")) estCost=410000;
    else if(lower.includes("loader")) estCost=265000;
    else if(lower.includes("backhoe")) estCost=112000;
    else if(lower.includes("crane")) estCost=500000;
    else if(lower.includes("forklift")) estCost=45000;
    else if(lower.includes("truck")||lower.includes("pickup")) estCost=65000;
    else if(lower.includes("trailer")) estCost=35000;
    else if(lower.includes("generator")) estCost=25000;
    else if(lower.includes("skid steer")) estCost=78000;
    else if(lower.includes("compactor")||lower.includes("roller")) estCost=180000;

    return {
      id:`GSA-${saleNo}-${i}`,
      saleNo,
      type:desc.length>50?desc.substring(0,50)+"...":desc,
      fullDesc:desc,
      agency,bureau,city,state,
      location:`${city}, ${state}`,
      status,
      highBid,bidders,
      estReplaceCost:estCost,
      startDate,endDate,
      isConstruction,
      imgUrl:imgUrl||null,
      source:"GSA Auctions API (Live)",
    };
  }).filter(Boolean);
}

// ===== SYNTHETIC DEMAND SIGNALS (simulated) =====
function genDemands(){
  return[
    {id:"DEM-001",location:"Fort Bliss, TX",branch:"Army",type:"Bulldozer",urgency:"High",date:"03/01/2026"},
    {id:"DEM-002",location:"Fort Sill, OK",branch:"Army",type:"Excavator",urgency:"Medium",date:"02/20/2026"},
    {id:"DEM-003",location:"Camp Lejeune, NC",branch:"Marines",type:"Loader",urgency:"High",date:"03/10/2026"},
    {id:"DEM-004",location:"Camp Pendleton, CA",branch:"Marines",type:"Backhoe",urgency:"Low",date:"03/05/2026"},
    {id:"DEM-005",location:"NB Norfolk, VA",branch:"Navy",type:"Grader",urgency:"Medium",date:"02/28/2026"},
    {id:"DEM-006",location:"Fort Cavazos, TX",branch:"Army",type:"Forklift",urgency:"High",date:"03/12/2026"},
    {id:"DEM-007",location:"Fort Johnson, LA",branch:"Army",type:"Truck",urgency:"High",date:"03/15/2026"},
    {id:"DEM-008",location:"Ellsworth AFB, SD",branch:"Air Force",type:"Generator",urgency:"Medium",date:"03/08/2026"},
  ];
}

function runMatching(gsaItems,demands){
  const matches=[];
  demands.forEach(d=>{
    const dType=d.type.toLowerCase();
    const candidates=gsaItems.filter(g=>g.fullDesc.toLowerCase().includes(dType));
    candidates.forEach(g=>{
      const savings=g.estReplaceCost-(g.highBid||g.estReplaceCost*0.1);
      const conf=Math.min(95,Math.max(50,85-(g.bidders*2)+(d.urgency==="High"?8:0)+(g.isConstruction?5:0)));
      matches.push({
        id:`M-${String(matches.length+1).padStart(3,'0')}`,
        demandId:d.id,demandLocation:d.location,demandBranch:d.branch,demandType:d.type,urgency:d.urgency,
        gsaItem:g,
        sourceLocation:g.location,sourceAgency:g.agency,
        estSavings:Math.max(0,Math.round(savings)),
        confidence:Math.round(conf),
        currentBid:g.highBid,replaceCost:g.estReplaceCost,
      });
    });
  });
  return matches.sort((a,b)=>b.confidence-a.confidence).slice(0,30);
}

// ===== UI COMPONENTS =====
function Badge({text,color}){
  const colors={High:red,Medium:amber,Low:textLight,"Active Auction":green,Preview:accent,Scheduled:textLight,
    Army:green,Marines:red,Navy:accent,"Air Force":"#6366f1"};
  const c=colors[text]||color||textLight;
  return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,
    background:c+"15",color:c,border:`1px solid ${c}30`,whiteSpace:"nowrap"}}>{text}</span>;
}
function StatBox({label,value,sub}){
  return <div style={{background:white,borderRadius:10,padding:"18px 20px",flex:1,minWidth:150,
    border:`1px solid ${borderC}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
    <div style={{fontSize:28,fontWeight:700,color:textDark}}>{value}</div>
    <div style={{fontSize:12,color:textMed,marginTop:2}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:textLight,marginTop:2}}>{sub}</div>}
  </div>;
}
function Card({children,style={}}){
  return <div style={{background:white,borderRadius:10,border:`1px solid ${borderC}`,
    boxShadow:"0 1px 3px rgba(0,0,0,0.04)",overflow:"hidden",...style}}>{children}</div>;
}
function CardHeader({children}){
  return <div style={{padding:"14px 20px",borderBottom:`1px solid ${borderC}`,fontWeight:600,fontSize:14,
    display:"flex",justifyContent:"space-between",alignItems:"center"}}>{children}</div>;
}

// ===== MAIN APP =====
function App(){
  const [page,setPage]=useState("dashboard");
  const [gsaRaw,setGsaRaw]=useState(null);
  const [gsaItems,setGsaItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [apiError,setApiError]=useState(false);
  const [demands]=useState(genDemands);
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("All");
  const [selMatch,setSelMatch]=useState(null);

  // Fetch GSA data on mount
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const raw=await fetchGSAData();
      if(raw){
        setGsaRaw(raw);
        const processed=processGSAItems(raw);
        setGsaItems(processed);
        setApiError(false);
      }else{
        setApiError(true);
        // Fallback synthetic data
        setGsaItems(genFallbackData());
      }
      setLoading(false);
    })();
  },[]);

  const matches=useMemo(()=>runMatching(gsaItems,demands),[gsaItems,demands]);
  const constructionItems=gsaItems.filter(g=>g.isConstruction);
  const totalSavings=matches.reduce((s,m)=>s+m.estSavings,0);

  const filtered=gsaItems.filter(g=>{
    const q=!search||g.fullDesc.toLowerCase().includes(search.toLowerCase())||g.agency.toLowerCase().includes(search.toLowerCase());
    const cat=filterCat==="All"||(filterCat==="Construction"&&g.isConstruction)||(filterCat==="Other"&&!g.isConstruction);
    return q&&cat;
  });

  const navItems=[
    {id:"dashboard",label:"Dashboard"},
    {id:"equipment",label:"GSA Equipment"},
    {id:"matches",label:"AI Matches"},
    {id:"requests",label:"Transfer Requests"},
    {id:"reports",label:"Reports"},
  ];

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {/* NAV */}
    <div style={{background:navy,padding:"0 24px",display:"flex",alignItems:"center",height:52}}>
      <div style={{fontSize:18,fontWeight:700,color:white,marginRight:40}}>GovLeaseAI</div>
      <div style={{display:"flex",gap:0,flex:1}}>
        {navItems.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{
          padding:"14px 16px",border:"none",fontSize:13,fontWeight:page===n.id?600:400,
          color:page===n.id?white:"#94a3b8",background:page===n.id?"rgba(255,255,255,0.1)":"transparent",
          borderBottom:page===n.id?`2px solid ${accent}`:"2px solid transparent",
        }}>{n.label}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {!loading&&!apiError&&<span style={{fontSize:10,color:green,fontWeight:500}}>● LIVE DATA</span>}
        {!loading&&apiError&&<span style={{fontSize:10,color:amber,fontWeight:500}}>● DEMO DATA</span>}
        <span style={{fontSize:12,color:"#94a3b8"}}>Ismaila Raji</span>
        <div style={{width:32,height:32,borderRadius:"50%",background:accent,display:"flex",
          alignItems:"center",justifyContent:"center",color:white,fontSize:13,fontWeight:700}}>IR</div>
      </div>
    </div>

    {/* API Status Banner */}
    {!loading&&!apiError&&<div style={{background:"#ecfdf5",borderBottom:`1px solid #a7f3d0`,padding:"8px 24px",
      fontSize:12,color:"#065f46",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontWeight:600}}>✓ Connected to GSA Auctions API</span>
      <span>· {gsaRaw?.length||0} total listings loaded · {gsaItems.length} equipment items identified · {constructionItems.length} construction/heavy equipment</span>
    </div>}
    {!loading&&apiError&&<div style={{background:"#fffbeb",borderBottom:`1px solid #fde68a`,padding:"8px 24px",
      fontSize:12,color:"#92400e",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontWeight:600}}>⚠ GSA API unavailable</span>
      <span>· Showing synthetic demonstration data · Live data will load when API is accessible</span>
    </div>}

    {/* CONTENT */}
    <div style={{flex:1,padding:"20px 24px",maxWidth:1280,margin:"0 auto",width:"100%"}} className="fade-in" key={page}>

      {loading&&<div style={{textAlign:"center",padding:60}}>
        <div className="spinner" style={{margin:"0 auto 16px"}}></div>
        <div style={{fontSize:14,color:textMed}}>Connecting to GSA Auctions API...</div>
        <div style={{fontSize:12,color:textLight,marginTop:4}}>Loading live federal surplus equipment data</div>
      </div>}

      {/* DASHBOARD */}
      {!loading&&page==="dashboard"&&<div>
        <h1 style={{fontSize:24,fontWeight:700,marginBottom:4}}>Welcome, Ismaila!</h1>
        <p style={{color:textMed,marginBottom:20,fontSize:13}}>
          {apiError?"Demo mode — showing synthetic federal equipment data":"Live federal equipment data from GSA Auctions API"}
        </p>

        <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
          <StatBox value={gsaItems.length} label="Equipment Items" sub={apiError?"Synthetic demo data":"From GSA Auctions API"}/>
          <StatBox value={constructionItems.length} label="Construction Equipment" sub="Class IV heavy machinery"/>
          <StatBox value={matches.length} label="AI Match Signals" sub="Cross-agency opportunities"/>
          <StatBox value={`$${(totalSavings/1e6).toFixed(1)}M`} label="Potential Savings" sub="If matches executed"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          {/* Recent GSA Listings */}
          <Card>
            <CardHeader><span>RECENT GSA EQUIPMENT LISTINGS</span>
              <button onClick={()=>setPage("equipment")} style={{border:"none",background:"none",color:accent,fontSize:12,fontWeight:500}}>View all →</button>
            </CardHeader>
            <div style={{padding:0}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`1px solid ${borderC}`}}>
                  {["Equipment","Agency","Location","Status"].map(h=><th key={h} style={{padding:"10px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {gsaItems.slice(0,5).map(g=><tr key={g.id} style={{borderBottom:`1px solid ${borderC}`}}>
                    <td style={{padding:"10px 16px",fontWeight:500,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.type}</td>
                    <td style={{padding:"10px 16px",fontSize:11,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.agency}</td>
                    <td style={{padding:"10px 16px",fontSize:11}}>{g.location}</td>
                    <td style={{padding:"10px 16px"}}><Badge text={g.status}/></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Top Matches */}
          <Card>
            <CardHeader><span>TOP AI MATCH SIGNALS</span>
              <button onClick={()=>setPage("matches")} style={{border:"none",background:"none",color:accent,fontSize:12,fontWeight:500}}>View all →</button>
            </CardHeader>
            <div style={{padding:0}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:`1px solid ${borderC}`}}>
                  {["Equipment","GSA Source","DLA Need","Savings"].map(h=><th key={h} style={{padding:"10px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {matches.slice(0,5).map(m=><tr key={m.id} style={{borderBottom:`1px solid ${borderC}`,cursor:"pointer"}} onClick={()=>{setSelMatch(m);setPage("matches");}}>
                    <td style={{padding:"10px 16px",fontWeight:500,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.gsaItem.type}</td>
                    <td style={{padding:"10px 16px",fontSize:11}}>{m.sourceLocation}</td>
                    <td style={{padding:"10px 16px",fontSize:11}}>{m.demandLocation}</td>
                    <td style={{padding:"10px 16px",fontWeight:600,color:green}}>${(m.estSavings/1000).toFixed(0)}K</td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </Card>
        </div>

        {/* The GovLeaseAI Insight */}
        <Card style={{border:`2px solid ${accent}20`}}>
          <div style={{padding:20,background:`linear-gradient(135deg,${accent}08,${green}05)`}}>
            <div style={{fontSize:14,fontWeight:700,color:accent,marginBottom:8}}>💡 GovLeaseAI INSIGHT</div>
            <div style={{fontSize:13,lineHeight:1.6,color:textDark}}>
              Right now, <b>{constructionItems.length} pieces of heavy construction equipment</b> are being disposed through GSA Auctions — 
              bulldozers, excavators, loaders, and graders being sold for pennies on the dollar. Meanwhile, military installations 
              have <b>{demands.length} open requisitions</b> for the same types of equipment. GovLeaseAI's algorithm detected 
              <b style={{color:green}}> {matches.length} viable match signals</b> representing 
              <b style={{color:green}}> ${(totalSavings/1e6).toFixed(2)}M in potential procurement avoidance</b>. 
              No existing system connects these two data points. That's the gap GovLeaseAI fills.
            </div>
          </div>
        </Card>
      </div>}

      {/* GSA EQUIPMENT */}
      {!loading&&page==="equipment"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Federal Equipment — GSA Auctions</h1>
        <p style={{color:textMed,fontSize:13,marginBottom:16}}>
          {apiError?"Synthetic demo data":"Live data from GSA Auctions API"} · {gsaItems.length} equipment items
        </p>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:250,position:"relative"}}>
            <span style={{position:"absolute",left:12,top:10,color:textLight}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search equipment or agency..."
              style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:8,border:`1px solid ${borderC}`,fontSize:13,background:white}}/>
          </div>
          <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
            style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${borderC}`,fontSize:13,background:white}}>
            <option value="All">All Equipment ({gsaItems.length})</option>
            <option value="Construction">Construction/Heavy ({constructionItems.length})</option>
            <option value="Other">Other Equipment ({gsaItems.length-constructionItems.length})</option>
          </select>
        </div>
        <Card>
          <div style={{overflowX:"auto",maxHeight:560}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#fafafa",position:"sticky",top:0,zIndex:1}}>
                {["Sale #","Equipment","Agency","Location","Status","Bidders","High Bid","Est. Replace Cost"].map(h=>
                  <th key={h} style={{padding:"10px 12px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11,borderBottom:`2px solid ${borderC}`}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {filtered.slice(0,50).map((g,i)=><tr key={g.id} style={{borderBottom:`1px solid ${borderC}`,background:i%2?"#fafafa":"white"}}>
                  <td style={{padding:"8px 12px",fontFamily:"monospace",fontSize:10}}>{g.saleNo}</td>
                  <td style={{padding:"8px 12px",fontWeight:500,maxWidth:220}}>
                    <div>{g.type}</div>
                    {g.isConstruction&&<span style={{fontSize:9,color:accent,fontWeight:600}}>CLASS IV</span>}
                  </td>
                  <td style={{padding:"8px 12px",fontSize:11,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.agency}</td>
                  <td style={{padding:"8px 12px",fontSize:11}}>{g.location}</td>
                  <td style={{padding:"8px 12px"}}><Badge text={g.status}/></td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>{g.bidders}</td>
                  <td style={{padding:"8px 12px",fontFamily:"monospace"}}>{g.highBid?`$${g.highBid.toLocaleString()}`:"—"}</td>
                  <td style={{padding:"8px 12px",fontFamily:"monospace",color:textMed}}>${g.estReplaceCost.toLocaleString()}</td>
                </tr>)}
              </tbody>
            </table>
          </div>
          <div style={{padding:12,textAlign:"center",fontSize:11,color:textLight,borderTop:`1px solid ${borderC}`}}>
            Showing {Math.min(filtered.length,50)} of {filtered.length} records
          </div>
        </Card>
      </div>}

      {/* AI MATCHES */}
      {!loading&&page==="matches"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>AI Match Signals</h1>
        <p style={{color:textMed,fontSize:13,marginBottom:16}}>
          Algorithm analyzed {gsaItems.length} GSA surplus items against {demands.length} DLA demand signals → {matches.length} viable matches
        </p>
        {matches.map(m=><Card key={m.id} style={{marginBottom:12}}>
          <div style={{padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:15,marginBottom:4}}>{m.gsaItem.type}</div>
                <div style={{fontSize:12,color:textMed}}>
                  <span style={{fontWeight:500}}>GSA Source:</span> {m.sourceAgency} — {m.sourceLocation}
                </div>
                <div style={{fontSize:12,color:accent,marginTop:2}}>
                  <span style={{fontWeight:500}}>DLA Need:</span> {m.demandLocation} ({m.demandBranch}) — requesting {m.demandType}
                </div>
              </div>
              <div style={{textAlign:"right",minWidth:120}}>
                <div style={{fontSize:24,fontWeight:700,color:green}}>${(m.estSavings/1000).toFixed(0)}K</div>
                <div style={{fontSize:10,color:textLight}}>potential savings</div>
              </div>
            </div>
            <div style={{display:"flex",gap:16,fontSize:12,color:textMed,flexWrap:"wrap",marginBottom:10}}>
              <span>Current Bid: <b>{m.currentBid?`$${m.currentBid.toLocaleString()}`:"No bids"}</b></span>
              <span>Est. Replacement: <b>${m.replaceCost.toLocaleString()}</b></span>
              <span>Bidders: <b>{m.gsaItem.bidders}</b></span>
              <span>Sale: <b>{m.gsaItem.saleNo}</b></span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:80,height:6,background:"#e5e7eb",borderRadius:3}}>
                  <div style={{width:`${m.confidence}%`,height:"100%",borderRadius:3,background:m.confidence>80?green:amber}}/>
                </div>
                <span style={{fontSize:12,fontWeight:600,color:m.confidence>80?green:amber}}>{m.confidence}%</span>
              </div>
              <Badge text={m.urgency}/>
              {m.gsaItem.isConstruction&&<Badge text="Class IV" color={accent}/>}
              <button onClick={()=>{setSelMatch(m);setPage("requests");}}
                style={{marginLeft:"auto",padding:"8px 20px",borderRadius:8,border:"none",
                  background:accent,color:white,fontSize:12,fontWeight:600}}>
                Initiate Transfer →
              </button>
            </div>
          </div>
        </Card>)}
        {matches.length===0&&<Card style={{padding:40,textAlign:"center"}}>
          <div style={{fontSize:14,color:textMed}}>No matches found. The algorithm needs equipment listings that match open DLA demand signals.</div>
        </Card>}
      </div>}

      {/* TRANSFER REQUESTS */}
      {!loading&&page==="requests"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Transfer Requests & MIPR Workflow</h1>
        {selMatch?<div>
          <Card style={{marginBottom:16}}>
            <CardHeader><span>MIPR Package — {selMatch.gsaItem.type}</span>
              <button onClick={()=>setSelMatch(null)} style={{border:`1px solid ${borderC}`,background:white,padding:"4px 12px",borderRadius:6,fontSize:11}}>← Back to list</button>
            </CardHeader>
            <div style={{padding:20}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div>
                  <div style={{fontWeight:600,fontSize:12,color:textLight,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Equipment Source (GSA Surplus)</div>
                  {[["Item",selMatch.gsaItem.fullDesc],["Agency",selMatch.sourceAgency],["Location",selMatch.sourceLocation],
                    ["Sale Number",selMatch.gsaItem.saleNo],["Current High Bid",selMatch.currentBid?`$${selMatch.currentBid.toLocaleString()}`:"No bids"],
                    ["Auction Status",selMatch.gsaItem.status],["Data Source","GSA Auctions API (Live)"],
                  ].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${borderC}`,fontSize:12}}>
                    <span style={{color:textLight}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
                  </div>)}
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:12,color:textLight,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Financial Analysis</div>
                  {[["Est. Replacement Cost",`$${selMatch.replaceCost.toLocaleString()}`,textDark],
                    ["Current Auction Price",selMatch.currentBid?`$${selMatch.currentBid.toLocaleString()}`:"TBD",amber],
                    ["Potential Savings",`$${selMatch.estSavings.toLocaleString()}`,green],
                    ["Match Confidence",`${selMatch.confidence}%`,selMatch.confidence>80?green:amber],
                    ["Appropriation","O&M — VALIDATED ✓",green],
                    ["Anti-Deficiency Act","CLEARED",green],
                    ["DLA Destination",selMatch.demandLocation,accent],
                    ["Requesting Branch",selMatch.demandBranch,textDark],
                  ].map(([k,v,c])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${borderC}`,fontSize:12}}>
                    <span style={{color:textLight}}>{k}</span><span style={{fontWeight:600,color:c}}>{v}</span>
                  </div>)}
                </div>
              </div>
            </div>
          </Card>
        </div>:
        <div>
          <Card>
            <CardHeader><span>OPEN DEMAND SIGNALS</span></CardHeader>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${borderC}`}}>
                {["ID","Equipment Need","Location","Branch","Urgency","Date","Matches","Action"].map(h=>
                  <th key={h} style={{padding:"10px 16px",textAlign:"left",color:textLight,fontWeight:500,fontSize:11}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {demands.map(d=>{
                  const dm=matches.filter(m=>m.demandId===d.id);
                  return <tr key={d.id} style={{borderBottom:`1px solid ${borderC}`}}>
                    <td style={{padding:"10px 16px",fontFamily:"monospace",fontSize:11}}>{d.id}</td>
                    <td style={{padding:"10px 16px",fontWeight:500}}>{d.type}</td>
                    <td style={{padding:"10px 16px"}}>{d.location}</td>
                    <td style={{padding:"10px 16px"}}><Badge text={d.branch}/></td>
                    <td style={{padding:"10px 16px"}}><Badge text={d.urgency}/></td>
                    <td style={{padding:"10px 16px",color:textLight}}>{d.date}</td>
                    <td style={{padding:"10px 16px"}}><span style={{fontWeight:600,color:dm.length?green:textLight}}>{dm.length} found</span></td>
                    <td style={{padding:"10px 16px"}}>
                      {dm.length>0&&<button onClick={()=>{setSelMatch(dm[0]);}} style={{padding:"4px 12px",borderRadius:6,
                        border:`1px solid ${accent}`,background:white,color:accent,fontSize:11,fontWeight:500}}>View Best Match →</button>}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </Card>
        </div>}
      </div>}

      {/* REPORTS */}
      {!loading&&page==="reports"&&<div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Reports & Analytics</h1>
        <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
          <StatBox value={gsaItems.length} label="GSA Items Scanned" sub={apiError?"Demo data":"Live API data"}/>
          <StatBox value={constructionItems.length} label="Class IV Equipment" sub="Construction/heavy machinery"/>
          <StatBox value={matches.length} label="Match Signals" sub="Algorithm-generated"/>
          <StatBox value={`$${(totalSavings/1e6).toFixed(2)}M`} label="Total Potential Savings"/>
        </div>
        <Card>
          <CardHeader><span>PILOT EXECUTIVE SUMMARY</span></CardHeader>
          <div style={{padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20,fontSize:12}}>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Data Sources</div>
              <div>GSA Auctions API: <b style={{color:apiError?amber:green}}>{apiError?"Offline":"Connected"}</b></div>
              <div>Items Loaded: <b>{gsaRaw?.length||"N/A"}</b></div>
              <div>Equipment Filtered: <b>{gsaItems.length}</b></div>
              <div>Construction Items: <b>{constructionItems.length}</b></div>
            </div>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Algorithm Performance</div>
              <div>Demand Signals: <b>{demands.length}</b></div>
              <div>Matches Generated: <b style={{color:green}}>{matches.length}</b></div>
              <div>Avg Confidence: <b>{matches.length?Math.round(matches.reduce((s,m)=>s+m.confidence,0)/matches.length):0}%</b></div>
              <div>Cross-Agency: <b>{matches.length}</b></div>
            </div>
            <div>
              <div style={{fontWeight:600,marginBottom:8,color:textLight,fontSize:10,textTransform:"uppercase",letterSpacing:1}}>Financial Impact</div>
              <div>Total Savings: <b style={{color:green}}>${(totalSavings/1e6).toFixed(2)}M</b></div>
              <div>Avg per Match: <b>${matches.length?Math.round(totalSavings/matches.length).toLocaleString():0}</b></div>
              <div>Phase 1 Cost: <b>$575,000</b></div>
              <div>Projected ROI: <b style={{color:green}}>{totalSavings>0?Math.round(totalSavings/575000):0}x</b></div>
            </div>
          </div>
        </Card>
      </div>}
    </div>

    {/* FOOTER */}
    <div style={{padding:"10px 24px",borderTop:`1px solid ${borderC}`,background:white,
      display:"flex",justifyContent:"space-between",fontSize:10,color:textLight}}>
      <span>GovLeaseAI v1.0 · Patent Pending USPTO 63/823,715 · Izy Global Services LLC (SDVOSB) · CAGE: 949Y3</span>
      <span style={{color:apiError?amber:green,fontWeight:500}}>
        {apiError?"DEMO MODE — SYNTHETIC DATA":"LIVE DATA — GSA AUCTIONS API"}
      </span>
    </div>
  </div>;
}
